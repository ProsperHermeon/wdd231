<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipes | TasteBud</title>
    <meta
      name="description"
      content="Browse 18 hand-picked recipes from cuisines around the globe. Filter by category, view details, and save favorites."
    />
    <meta name="author" content="Prosper" />

    <meta property="og:title" content="Recipes | TasteBud" />
    <meta
      property="og:description"
      content="Browse 18 hand-picked recipes from cuisines around the globe."
    />
    <meta
      property="og:image"
      content="https://prosperhermeon.github.io/wdd231/final/images/favicon.svg"
    />
    <meta
      property="og:url"
      content="https://prosperhermeon.github.io/wdd231/final/recipes.html"
    />

    <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/small.css" />
    <link rel="stylesheet" href="styles/larger.css" />
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/recipes.js" type="module"></script>
    <script src="scripts/date.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="branding">
        <img class="logo" src="images/favicon.svg" width="40" height="40" alt="TasteBud logo" />
        <span class="site-name">TasteBud</span>
      </a>
      <button type="button" id="menu" aria-controls="primary-nav" aria-expanded="false" aria-label="Toggle navigation menu">
        <span class="sr-only">Menu</span>
        <span class="bar" aria-hidden="true"></span>
      </button>
      <nav id="primary-nav" class="site-nav" aria-label="Main navigation" aria-hidden="true">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li class="active"><a href="recipes.html">Recipes</a></li>
          <li><a href="favorites.html">Favorites</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1 class="page-title">All Recipes</h1>

      <section aria-labelledby="browse-heading">
        <h2 id="browse-heading" class="sr-only">Browse Recipes</h2>
        <div class="filter-bar">
          <button class="filter-btn active" data-cat="all">All</button>
          <button class="filter-btn" data-cat="Main">Main</button>
          <button class="filter-btn" data-cat="Starter">Starter</button>
          <button class="filter-btn" data-cat="Dessert">Dessert</button>
        </div>
        <p class="result-count" id="result-count"></p>
        <div id="recipe-grid" class="card-grid"></div>
      </section>

      <section aria-labelledby="search-heading" class="search-section">
        <h2 id="search-heading">Search by Name</h2>
        <div class="search-bar">
          <label for="search-input" class="sr-only">Search recipes</label>
          <input
            type="search"
            id="search-input"
            placeholder="Type a recipe name…"
            autocomplete="off"
          />
        </div>
      </section>
    </main>

    <dialog id="recipe-modal" aria-labelledby="modal-title">
      <div class="modal-inner">
        <button type="button" class="modal-close" aria-label="Close dialog">&times;</button>
        <h2 id="modal-title"></h2>
        <img id="modal-img" src="" alt="" width="400" height="267" loading="lazy" />
        <dl id="modal-details"></dl>
        <h3>Ingredients</h3>
        <ul id="modal-ingredients"></ul>
        <p id="modal-desc"></p>
      </div>
    </dialog>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>&copy; <span id="currentyear"></span> TasteBud &mdash; Prosper | WDD 231</p>
        <p id="lastModified"></p>
        <nav class="footer-links" aria-label="Footer navigation">
          <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer" id="video-link">Project Video</a>
          <a href="attributions.html">Attributions</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
